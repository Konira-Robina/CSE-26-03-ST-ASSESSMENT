<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Videx{% endblock %}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #ff0000;
    --black: #111;
    --grey: #888;
    --light-grey: #ccc;
    --border: #d0d0d0;
    --bg: #fff;
    --card-radius: 10px;
  }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--bg);
    color: var(--black);
    min-height: 100vh;
  }

  /* NAVBAR */
  .navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 32px;
    border-bottom: 1px solid #f0f0f0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
  }

  .logo-text {
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--red);
    letter-spacing: -0.5px;
  }

  .btn-outline {
    background: #fff;
    color: var(--red);
    border: 2px solid var(--red);
    padding: 10px 28px;
    border-radius: 8px;
    font-family: 'Barlow', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: background 0.18s, color 0.18s;
    letter-spacing: 0.3px;
  }

  .btn-outline:hover { background: #fff5f5; }
  .btn-outline:active { background: #fff; color: var(--red); }
</style>
{% block extra_css %}{% endblock %}
</head>
<body>
{% block content %}{% endblock %}
</body>
</html>
